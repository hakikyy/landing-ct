<!DOCTYPE html>
<html class="scroll-smooth" lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <!-- Title is set dynamically by service-detail.js -->
    <title>Detail Layanan | PT Cutting Edge Indonesia</title>
    <script src="src/js/tailwind-config.js"></script>
    <link href="src/style/global.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Work+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
</head>

<body class="bg-background text-on-background font-body-md overflow-x-hidden">
    <div id="site-header"></div>
    <!-- Skeleton loader — shown while JS fetches data -->
    <div id="service-detail-skeleton">
        <!-- Skeleton Hero -->
        <div class="bg-deep-maroon min-h-[50vh] flex items-end pb-16">
            <div class="max-w-container-max mx-auto px-4 sm:px-6 lg:px-margin-desktop w-full pt-28">
                <div class="animate-pulse space-y-4 max-w-2xl">
                    <div class="h-4 w-32 bg-white/20 rounded-full"></div>
                    <div class="h-6 w-24 bg-white/20 rounded-full"></div>
                    <div class="h-12 w-3/4 bg-white/30 rounded-xl"></div>
                    <div class="h-6 w-1/2 bg-white/20 rounded-lg"></div>
                    <div class="flex gap-3 pt-2">
                        <div class="h-9 w-28 bg-white/20 rounded-full"></div>
                        <div class="h-9 w-28 bg-white/20 rounded-full"></div>
                        <div class="h-9 w-28 bg-white/20 rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Skeleton Body -->
        <div class="max-w-container-max mx-auto px-4 sm:px-6 lg:px-margin-desktop py-16">
            <div class="grid lg:grid-cols-3 gap-10 animate-pulse">
                <div class="lg:col-span-2 space-y-10">
                    <div class="space-y-3">
                        <div class="h-8 w-48 bg-surface-container rounded-xl"></div>
                        <div class="h-4 w-full bg-surface-container rounded"></div>
                        <div class="h-4 w-5/6 bg-surface-container rounded"></div>
                        <div class="h-4 w-4/6 bg-surface-container rounded"></div>
                    </div>
                    <div class="space-y-3">
                        <div class="h-8 w-40 bg-surface-container rounded-xl"></div>
                        <div class="h-14 w-full bg-surface-container rounded-xl"></div>
                        <div class="h-14 w-full bg-surface-container rounded-xl"></div>
                        <div class="h-14 w-full bg-surface-container rounded-xl"></div>
                    </div>
                </div>
                <div class="space-y-6">
                    <div class="h-64 w-full bg-surface-container rounded-2xl"></div>
                    <div class="h-48 w-full bg-surface-container rounded-2xl"></div>
                </div>
            </div>
        </div>
    </div>
    <!-- Actual content — hidden until JS renders it -->
    <div id="service-detail-content" class="hidden"></div>
    <div id="site-footer"></div>
    <!-- Load shared scripts first, then detail logic -->
    <script src="src/js/index.js" defer></script>
    <script src="src/js/service-detail.js" defer></script>
</body>

</html>
